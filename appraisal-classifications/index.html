<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appraisal Classification Rules Engine</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM (UMD versions for browser) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel (to compile JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-slate-100 min-h-screen">
    <!-- The app will render inside this div -->
    <div id="root"></div>

    <!-- Application Logic -->
    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // SafeIcon component to render Lucide icons in a standalone environment
      const SafeIcon = ({ iconName, size = 20, className = "" }) => {
        const spanRef = useRef(null);

        useEffect(() => {
          if (spanRef.current && window.lucide && window.lucide.icons[iconName]) {
            // Clear previous icon to prevent duplicates
            spanRef.current.innerHTML = "";
            // Create SVG element using Lucide's internal createElement generator
            const svg = window.lucide.createElement(window.lucide.icons[iconName]);
            svg.setAttribute("width", size);
            svg.setAttribute("height", size);
            if (className) svg.setAttribute("class", className);
            spanRef.current.appendChild(svg);
          }
        }, [iconName, size, className]);

        return <span ref={spanRef} className="inline-flex items-center justify-center"></span>;
      };

      function App() {
        // State for the 4 core inputs
        const [propType, setPropType] = useState("Single-Family");
        const [loanProgram, setLoanProgram] = useState("Conventional");
        const [transaction, setTransaction] = useState("Purchase");
        const [occupancy, setOccupancy] = useState("Primary");

        // State for the new Risk Profile sliders
        const [creditScore, setCreditScore] = useState(740);
        const [ltv, setLtv] = useState(80);

        // State for the AUS Findings
        const [aus, setAus] = useState("Full");
        const [isAusManuallyOverridden, setIsAusManuallyOverridden] = useState(false);

        // Result state
        const [result, setResult] = useState(null);

        // Options Definitions (Mapped to string names for the SafeIcon)
        const propOptions = [
          { id: "Single-Family", icon: "Home", label: "Single Family" },
          { id: "Condo", icon: "Building", label: "Condo" },
          { id: "Multi-Family", icon: "Building", label: "Multi-Family (2-4)" },
          { id: "Manufactured", icon: "Box", label: "Manufactured" },
        ];

        const loanOptions = [
          { id: "Conventional", icon: "Briefcase", label: "Conventional (GSE)" },
          { id: "FHA", icon: "Shield", label: "FHA" },
          { id: "VA", icon: "Star", label: "VA" },
          { id: "Non-GSE", icon: "Lock", label: "Non-GSE / Jumbo" },
        ];

        const transOptions = [
          { id: "Purchase", icon: "ShoppingCart", label: "Purchase" },
          { id: "Rate/Term", icon: "Percent", label: "Rate/Term Refi" },
          { id: "Cash-Out", icon: "Repeat", label: "Cash-Out Refi" },
          { id: "HELOC", icon: "CreditCard", label: "HELOC" },
        ];

        const occOptions = [
          { id: "Primary", icon: "User", label: "Primary Residence" },
          { id: "Second", icon: "Key", label: "Second Home" },
          { id: "Investment", icon: "Users", label: "Investment / Tenant" },
        ];

        const ausOptions = [
          { id: "Full", label: "Full Appraisal Required" },
          { id: "Desktop", label: "Desktop Eligible" },
          { id: "Hybrid", label: "Hybrid / PDC Eligible" },
          { id: "Waiver", label: "Value Acceptance (Waiver)" },
        ];

        // Logic 1: The Automated AUS Simulator
        useEffect(() => {
          if (isAusManuallyOverridden) return;

          let calculatedAus = "Full";

          const isEligibleForAlternatives =
            loanProgram === "Conventional" &&
            ["Single-Family", "Condo"].includes(propType) &&
            ["Primary", "Second"].includes(occupancy) &&
            ["Purchase", "Rate/Term"].includes(transaction);

          if (isEligibleForAlternatives) {
            if (creditScore >= 760 && ltv <= 80) {
              calculatedAus = "Waiver";
            } else if (creditScore >= 720 && ltv <= 90) {
              calculatedAus = "Desktop";
            } else if (creditScore >= 680 && ltv <= 95) {
              calculatedAus = "Hybrid";
            }
          }

          setAus(calculatedAus);
        }, [creditScore, ltv, propType, loanProgram, transaction, occupancy, isAusManuallyOverridden]);

        // Logic 2: The Final Rules Engine
        useEffect(() => {
          let newResult = { error: false, waiver: false };

          if (aus === "Waiver") {
            newResult.waiver = true;
            newResult.message = "Value Acceptance (Waiver): No appraisal required.";
            setResult(newResult);
            return;
          }

          if ((loanProgram === "FHA" || loanProgram === "VA") && (aus === "Desktop" || aus === "Hybrid")) {
            newResult.error = true;
            newResult.message = `Conflict: ${loanProgram} loans typically require Traditional Full Appraisals, overriding AUS Desktop/Hybrid findings.`;
          }

          switch (propType) {
            case "Condo":
              newResult.form = "1073 (Condo)";
              break;
            case "Multi-Family":
              newResult.form = "1025 (Multi-Family)";
              break;
            case "Manufactured":
              newResult.form = "1004C (Manufactured)";
              break;
            default:
              newResult.form = "1004 (URAR)";
          }

          newResult.addenda = [];
          if (occupancy === "Investment") {
            newResult.addenda.push("1007 (Rent Schedule)", "216 (Income Statement)");
          }

          if (["FHA", "VA", "USDA"].includes(loanProgram)) {
            newResult.entity = "GOVVY";
            newResult.dataStandard = "UAD / Agency Specific MISMO";
          } else if (loanProgram === "Non-GSE") {
            newResult.entity = "Non-GSE / Private";
            newResult.dataStandard = "MISMO XML";
          } else {
            newResult.entity = "GSE (Fannie Mae / Freddie Mac)";
            newResult.dataStandard = "UAD 2.6 / Transitioning to UAD 3.6";
          }

          switch (aus) {
            case "Desktop":
              newResult.scope = "Desktop Appraisal (Data only)";
              break;
            case "Hybrid":
              newResult.scope = "Hybrid / Bifurcated (UPD + Desktop)";
              break;
            default:
              newResult.scope = "Traditional (Full Interior & Exterior)";
          }

          setResult(newResult);
        }, [propType, loanProgram, transaction, occupancy, aus]);

        const handleAusClick = (id) => {
          setAus(id);
          setIsAusManuallyOverridden(true);
        };

        const resetToAuto = () => {
          setIsAusManuallyOverridden(false);
        };

        const handleSliderChange = (setter, value) => {
          setter(value);
          setIsAusManuallyOverridden(false);
        };

        const SelectionButton = ({ options, currentVal, setter }) => (
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-6">
            {options.map((opt) => {
              const isActive = currentVal === opt.id;
              return (
                <button
                  key={opt.id}
                  onClick={() => setter(opt.id)}
                  className={`p-3 rounded-lg border text-sm font-medium transition-all flex flex-col items-center gap-2
                  ${
                    isActive
                      ? "bg-blue-50 border-blue-600 text-blue-700 shadow-sm ring-1 ring-blue-600"
                      : "bg-white border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300"
                  }`}
                >
                  {opt.icon && (
                    <SafeIcon iconName={opt.icon} size={20} className={isActive ? "text-blue-600" : "text-slate-400"} />
                  )}
                  <span className="text-center">{opt.label}</span>
                </button>
              );
            })}
          </div>
        );

        return (
          <div className="p-4 md:p-8 font-sans text-slate-800">
            <div className="max-w-7xl mx-auto space-y-6">
              {/* Header */}
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                <h1 className="text-3xl font-bold text-slate-800 tracking-tight">
                  Appraisal Classification Rules Engine
                </h1>
                <p className="text-slate-500 mt-2">
                  Select the loan parameters to determine the correct entity, forms, and scope of work.
                </p>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                {/* LEFT COLUMN: The Wizard (Inputs) */}
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                  <div className="flex items-center gap-2 mb-6 border-b pb-4">
                    <SafeIcon iconName="Settings" className="text-blue-600" />
                    <h2 className="text-xl font-bold">Data Intake Wizard</h2>
                  </div>

                  <h3 className="text-sm font-bold text-slate-500 uppercase mb-2">1. Property Type</h3>
                  <SelectionButton
                    options={propOptions}
                    currentVal={propType}
                    setter={(val) => {
                      setPropType(val);
                      setIsAusManuallyOverridden(false);
                    }}
                  />

                  <h3 className="text-sm font-bold text-slate-500 uppercase mb-2">2. Loan Program</h3>
                  <SelectionButton
                    options={loanOptions}
                    currentVal={loanProgram}
                    setter={(val) => {
                      setLoanProgram(val);
                      setIsAusManuallyOverridden(false);
                    }}
                  />

                  <h3 className="text-sm font-bold text-slate-500 uppercase mb-2">3. Transaction Purpose</h3>
                  <SelectionButton
                    options={transOptions}
                    currentVal={transaction}
                    setter={(val) => {
                      setTransaction(val);
                      setIsAusManuallyOverridden(false);
                    }}
                  />

                  <h3 className="text-sm font-bold text-slate-500 uppercase mb-2">4. Occupancy Status</h3>
                  <SelectionButton
                    options={occOptions}
                    currentVal={occupancy}
                    setter={(val) => {
                      setOccupancy(val);
                      setIsAusManuallyOverridden(false);
                    }}
                  />

                  {/* Sliders for Risk Profile */}
                  <div className="flex items-center justify-between mb-2">
                    <h3 className="text-sm font-bold text-slate-500 uppercase">5. Borrower Risk Profile</h3>
                    <div className="flex items-center gap-1 text-xs text-slate-400">
                      <SafeIcon iconName="SlidersHorizontal" size={14} /> AUS Simulator
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-inner">
                    {/* Credit Score Slider */}
                    <div className="flex flex-col gap-2">
                      <label className="flex justify-between text-sm font-medium text-slate-700">
                        <span>Credit Score</span>
                        <span
                          className={`font-bold ${creditScore < 620 ? "text-rose-500" : creditScore > 740 ? "text-emerald-500" : "text-blue-600"}`}
                        >
                          {creditScore}
                        </span>
                      </label>
                      <input
                        type="range"
                        min="500"
                        max="850"
                        step="1"
                        value={creditScore}
                        onChange={(e) => handleSliderChange(setCreditScore, parseInt(e.target.value))}
                        className="w-full accent-blue-600"
                      />
                      <div className="flex justify-between text-[10px] text-slate-400 font-mono">
                        <span>500</span>
                        <span>850</span>
                      </div>
                    </div>

                    {/* LTV Slider */}
                    <div className="flex flex-col gap-2">
                      <label className="flex justify-between text-sm font-medium text-slate-700">
                        <span>Loan-to-Value (LTV)</span>
                        <span
                          className={`font-bold ${ltv > 95 ? "text-rose-500" : ltv < 80 ? "text-emerald-500" : "text-blue-600"}`}
                        >
                          {ltv}%
                        </span>
                      </label>
                      <input
                        type="range"
                        min="50"
                        max="100"
                        step="1"
                        value={ltv}
                        onChange={(e) => handleSliderChange(setLtv, parseInt(e.target.value))}
                        className="w-full accent-blue-600"
                      />
                      <div className="flex justify-between text-[10px] text-slate-400 font-mono">
                        <span>50%</span>
                        <span>100%</span>
                      </div>
                    </div>
                  </div>

                  {/* AUS Override */}
                  <div className="flex items-end justify-between mb-2">
                    <h3 className="text-sm font-bold text-slate-500 uppercase">6. AUS Findings</h3>
                    {isAusManuallyOverridden && (
                      <button
                        onClick={resetToAuto}
                        className="text-xs font-medium text-blue-600 hover:text-blue-800 flex items-center gap-1 bg-blue-50 px-2 py-1 rounded-md border border-blue-200 transition-colors"
                      >
                        <SafeIcon iconName="RefreshCw" size={12} /> Auto-Calculate
                      </button>
                    )}
                  </div>

                  {/* Wrapper div to indicate manual override visually */}
                  <div
                    className={`p-1 -m-1 rounded-xl transition-all ${isAusManuallyOverridden ? "bg-amber-100/50 ring-1 ring-amber-300" : ""}`}
                  >
                    <SelectionButton options={ausOptions} currentVal={aus} setter={handleAusClick} />
                  </div>
                  {isAusManuallyOverridden && (
                    <p className="text-xs text-amber-600 mt-[-16px] mb-4 pl-1 flex items-center gap-1">
                      <SafeIcon iconName="AlertCircle" size={12} /> Value manually overridden
                    </p>
                  )}
                </div>

                {/* RIGHT COLUMN: The Dynamic Infographic (Outputs) */}
                <div className="bg-slate-900 rounded-2xl shadow-xl overflow-hidden flex flex-col relative text-slate-100 border border-slate-800">
                  <div className="p-6 bg-slate-800/50 border-b border-slate-700 flex justify-between items-center">
                    <div className="flex items-center gap-2">
                      <SafeIcon iconName="Database" className="text-emerald-400" />
                      <h2 className="text-xl font-bold text-white">Live Logic Infographic</h2>
                    </div>
                  </div>

                  <div className="flex-1 p-6 relative">
                    {/* Top: Inputs Highlight */}
                    <div className="flex justify-center gap-2 flex-wrap mb-6">
                      {[propType, loanProgram, transaction, occupancy].map((val, i) => (
                        <span
                          key={i}
                          className="px-3 py-1 bg-slate-800 border border-slate-600 rounded-full text-xs font-mono text-emerald-300 shadow-inner"
                        >
                          {val}
                        </span>
                      ))}
                      <span className="px-3 py-1 bg-blue-900/50 border border-blue-700 rounded-full text-xs font-mono text-blue-300 shadow-inner">
                        {creditScore} FICO | {ltv}% LTV
                      </span>
                      <span
                        className={`px-3 py-1 border rounded-full text-xs font-mono shadow-inner ${isAusManuallyOverridden ? "bg-amber-900/50 border-amber-700 text-amber-300" : "bg-purple-900/50 border-purple-700 text-purple-300"}`}
                      >
                        AUS: {aus}
                      </span>
                    </div>

                    {/* Connecting Line */}
                    <div className="w-px h-8 bg-gradient-to-b from-emerald-500 to-blue-500 mx-auto -mt-4 mb-2"></div>

                    {/* Rules Engine Node */}
                    <div className="flex justify-center mb-6 z-10 relative">
                      <div className="bg-blue-600 p-4 rounded-full shadow-lg shadow-blue-900/50 ring-4 ring-slate-900">
                        <SafeIcon
                          iconName="Settings"
                          className="text-white animate-[spin_4s_linear_infinite]"
                          size={32}
                        />
                      </div>
                    </div>

                    {/* Output Results */}
                    {result && (
                      <div className="space-y-4">
                        {result.waiver ? (
                          <div className="bg-emerald-500/20 border border-emerald-500/50 rounded-xl p-6 text-center text-emerald-400 mt-8">
                            <div className="flex justify-center mb-4 opacity-80">
                              <SafeIcon iconName="CheckCircle" size={48} />
                            </div>
                            <h3 className="text-xl font-bold mb-2">Value Acceptance (Waiver)</h3>
                            <p className="text-emerald-200">
                              No appraisal is required for this transaction based on the simulated AUS findings.
                            </p>
                          </div>
                        ) : (
                          <>
                            {result.error && (
                              <div className="bg-rose-500/10 border border-rose-500/50 rounded-xl p-4 flex gap-3 text-rose-400 mb-6 items-start">
                                <div className="shrink-0 mt-0.5">
                                  <SafeIcon iconName="AlertCircle" size={20} />
                                </div>
                                <p className="text-sm">{result.message}</p>
                              </div>
                            )}

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                              {/* Entity Output */}
                              <div className="bg-slate-800 rounded-xl p-4 border border-slate-700 shadow-inner hover:border-slate-500 transition-colors">
                                <div className="text-xs text-slate-400 uppercase tracking-wider mb-1 flex items-center gap-2">
                                  <SafeIcon iconName="Briefcase" size={14} /> Entity Class
                                </div>
                                <div className="font-semibold text-blue-300">{result.entity}</div>
                              </div>

                              {/* Standard Output */}
                              <div className="bg-slate-800 rounded-xl p-4 border border-slate-700 shadow-inner hover:border-slate-500 transition-colors">
                                <div className="text-xs text-slate-400 uppercase tracking-wider mb-1 flex items-center gap-2">
                                  <SafeIcon iconName="FileText" size={14} /> Data Standard
                                </div>
                                <div className="font-semibold text-purple-300">{result.dataStandard}</div>
                              </div>

                              {/* Form Output */}
                              <div className="bg-slate-800 rounded-xl p-4 border border-slate-700 shadow-inner hover:border-slate-500 transition-colors">
                                <div className="text-xs text-slate-400 uppercase tracking-wider mb-1 flex items-center gap-2">
                                  <SafeIcon iconName="FileText" size={14} /> Required Form(s)
                                </div>
                                <div className="font-semibold text-emerald-300">{result.form}</div>
                                {result.addenda && result.addenda.length > 0 && (
                                  <div className="mt-2 pt-2 border-t border-slate-700">
                                    <div className="text-xs text-slate-400 mb-1">Triggered Addenda:</div>
                                    {result.addenda.map((add, i) => (
                                      <div key={i} className="text-sm text-emerald-400/80">
                                        + {add}
                                      </div>
                                    ))}
                                  </div>
                                )}
                              </div>

                              {/* Scope Output */}
                              <div className="bg-slate-800 rounded-xl p-4 border border-slate-700 shadow-inner hover:border-slate-500 transition-colors">
                                <div className="text-xs text-slate-400 uppercase tracking-wider mb-1 flex items-center gap-2">
                                  <SafeIcon iconName="Users" size={14} /> Appraisal Type (Scope)
                                </div>
                                <div className="font-semibold text-amber-300">{result.scope}</div>
                              </div>
                            </div>
                          </>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // Mount the React application to the DOM
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
